name: Titanic MLOps Pipeline

on:
  push:
    paths:
      - "data/**"
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "params.yaml"
      - "dvc.yaml"
      - "requirements.txt"
      - ".github/workflows/mlops-pipeline.yml"
  pull_request:
    paths:
      - "data/**"
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "params.yaml"
      - "dvc.yaml"
      - "requirements.txt"
      - ".github/workflows/mlops-pipeline.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"

jobs:
  train-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Show DVC and MLflow versions
        run: |
          dvc --version
          mlflow --version

      - name: Run unit tests
        run: pytest -q tests

      - name: Run training, validation, and local deployment pipeline
        run: python scripts/run_pipeline.py --data data/titanic.csv --min-accuracy 0.70

      - name: Upload pipeline outputs
        uses: actions/upload-artifact@v4
        with:
          name: titanic-mlops-outputs
          path: |
            mlruns/
            reports/
            models/
            deployment/
